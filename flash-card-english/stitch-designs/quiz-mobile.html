</div>

</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline font-extrabold text-2xl text-on-surface">15</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">Words left</span>
</div>
</div>
<p class="font-headline font-bold text-on-primary-container uppercase tracking-widest text-xs">Vocabulary Mastery Session</p>

<span class="material-symbols-outlined text-xl">volume_up</span>
<span class="font-body italic opacity-60">/ˈdɪl.ɪ.dʒənt/</span>
</div>
</div>
</div>
<!-- Options Grid -->
<div class="w-full max-w-2xl grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option 1 -->
<button class="group flex items-center justify-between p-6 bg-surface-container-low rounded-2xl hover:bg-surface-container-lowest hover:shadow-xl transition-all duration-300 text-left border border-transparent hover:border-outline-variant/15">
<div>

</div>
</button>
<!-- Option 2 (Target/Correct Answer State UI Placeholder) -->
<button class="group flex items-center justify-between p-6 bg-surface-container-low rounded-2xl hover:bg-surface-container-lowest hover:shadow-xl transition-all duration-300 text-left border border-transparent hover:border-outline-variant/15">
<div>
<span class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Option B</span>
<span class="text-xl font-headline font-bold text-on-surface">Rajin</span>

<div class="w-8 h-8 rounded-full border-2 border-outline-variant/30 flex items-center justify-center group-hover:border-secondary transition-colors">
<span class="w-2 h-2 rounded-full bg-secondary opacity-0 group-hover:opacity-100 transition-opacity"></span>
</div>
</button>

<div>

<span class="text-xl font-headline font-bold text-on-surface">Pintar</span>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant/30 flex items-center justify-center group-hover:border-secondary transition-colors">
<span class="w-2 h-2 rounded-full bg-secondary opacity-0 group-hover:opacity-100 transition-opacity"></span>
</div>
</button>
<!-- Option 4 -->
<button class="group flex items-center justify-between p-6 bg-surface-container-low rounded-2xl hover:bg-surface-container-lowest hover:shadow-xl transition-all duration-300 text-left border border-transparent hover:border-outline-variant/15">
<div>
<span class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Option D</span>
<span class="text-xl font-headline font-bold text-on-surface">Cepat</span>

<div class="w-8 h-8 rounded-full border-2 border-outline-variant/30 flex items-center justify-center group-hover:border-secondary transition-colors">

<span class="material-symbols-outlined text-lg">flag</span>

<button class="px-10 py-4 rounded-full font-label font-bold text-xs uppercase tracking-widest bg-gradient-to-r from-primary-container to-on-primary-fixed-variant text-white shadow-lg shadow-primary-container/20 active:scale-95 transition-all">

</div>

</div>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<div class="flex items-center gap-2">

<span class="text-xs font-bold tabular-nums text-on-surface-variant">04:42</span>
